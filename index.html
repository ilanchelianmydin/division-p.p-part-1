<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Management Division</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --bg: #0c0c0e;
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.45);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  /* ── CANVAS BG ── */
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── NOISE OVERLAY ── */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
  }

  /* ── MAIN WRAPPER ── */
  .wrapper {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 32px;
    gap: 0;
  }

  /* ── TOP EYEBROW ── */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .eyebrow-line {
    width: 36px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .eyebrow-line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .eyebrow-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ── MAIN TITLE ── */
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 62px);
    font-weight: 300;
    line-height: 1.0;
    text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }

  .title em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200%;
    animation: shimmer 4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ── TAGLINE ── */
  .tagline {
    font-size: clamp(11px, 1.2vw, 13px);
    color: var(--muted);
    text-align: center;
    max-width: 380px;
    line-height: 1.7;
    margin-bottom: 0;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
  }

  /* ── DEPT PILLS ── */
  .depts {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.8s forwards;
  }

  .dept {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    font-size: 12px;
    font-weight: 400;
    color: rgba(240,236,228,0.65);
    letter-spacing: 0.02em;
    cursor: default;
    transition: all 0.3s;
    backdrop-filter: blur(8px);
  }

  .dept:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    transform: translateY(-2px);
  }

  .dept-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.9s ease 1s forwards;
  }

  /* ── BOTTOM STATS ── */
  .stats {
    display: flex;
    gap: 48px;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.1s forwards;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    margin-bottom: 5px;
  }

  .stat-lbl {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-sep {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.08);
  }

  /* ── CORNER MARKS ── */
  .corner {
    position: fixed;
    width: 20px; height: 20px;
    z-index: 3;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner.tr { top: 20px; right: 20px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  /* ── BADGE ── */
  .badge {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 3;
    opacity: 0;
    animation: fadeIn 1s ease 1.3s forwards;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .stats { gap: 24px; }
    .depts { gap: 8px; }
    .dept { padding: 7px 14px; font-size: 11px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="noise"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>



<div class="wrapper">

  <div class="eyebrow">
    <div class="eyebrow-line"></div>
    <span class="eyebrow-text">Welcome to</span>
    <div class="eyebrow-line right"></div>
  </div>

  <h1 class="title">
    Property<br><em>Management</em><br>Division
  </h1>

  <p class="tagline">
    One division. Four pillars. Built to plan, manage, source, and sustain every property — end to end.
  </p>



</div>



<script>
// ── CANVAS PARTICLE WAVES ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], lines = [];
let mouse = { x: -999, y: -999 };
let animId;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initLines();
}

// Wave lines
function initLines() {
  lines = [];
  const count = 6;
  for (let i = 0; i < count; i++) {
    lines.push({
      y: H * (0.15 + i * 0.14),
      amp: 20 + Math.random() * 40,
      freq: 0.003 + Math.random() * 0.003,
      speed: 0.0003 + Math.random() * 0.0004,
      phase: Math.random() * Math.PI * 2,
      opacity: 0.03 + Math.random() * 0.05,
    });
  }
}

// Floating particles
function initParticles() {
  particles = [];
  const count = 40;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 1 + Math.random() * 1.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.1 - Math.random() * 0.3,
      alpha: 0.1 + Math.random() * 0.3,
      life: Math.random(),
    });
  }
}

let t = 0;
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Dark radial gradient
  const grad = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.75);
  grad.addColorStop(0, 'rgba(201,168,76,0.05)');
  grad.addColorStop(0.5, 'rgba(30,20,10,0.3)');
  grad.addColorStop(1, 'rgba(12,12,14,0.8)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Wave lines
  t += 0.5;
  lines.forEach(l => {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(201,168,76,${l.opacity})`;
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 4) {
      const y = l.y + Math.sin(x * l.freq + t * l.speed * 1000 + l.phase) * l.amp;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  });

  // Particles
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life += 0.004;
    if (p.life > 1) p.life = 0;

    const a = p.alpha * Math.sin(p.life * Math.PI);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(201,168,76,${a})`;
    ctx.fill();

    if (p.y < -10) {
      p.x = Math.random() * W;
      p.y = H + 10;
      p.life = 0;
    }
  });

  // Mouse glow
  if (mouse.x > 0) {
    const mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
    mg.addColorStop(0, 'rgba(201,168,76,0.06)');
    mg.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.fillStyle = mg;
    ctx.fillRect(0, 0, W, H);
  }

  animId = requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); initParticles(); });
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

resize();
initParticles();
draw();
</script>
</body>
</html>
